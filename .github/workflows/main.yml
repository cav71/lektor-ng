name: Main-build

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  PACKAGE: ${{ github.event.repository.name }}
  PYTHONPATH: src
  # GITHUB_DUMP: ${{ toJson(github) }}
  GITHUB_DUMP: |
    {
      "event": {
        "repository": {
          "name": "${{ github.event.repository.name }}",
          "default_branch": "${{ github.event.repository.default_branch }}",
          "html_url": "${{ github.event.repository.html_url }}"
        }
      },
      "ref": "${{ github.ref }}",
      "sha": "${{ github.sha }}",
      "run_number": "${{ github.run_number }}",
      "ref_name": "${{ github.ref_name }}"
    }
  TARGETPY: "3.13"
  TARGETOS: "ubuntu-latest"


jobs:
  main:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ${{ matrix.os }}

    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # WARNING!! this is important
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Dump ENV
        shell: bash
        run: |
          echo "=== GITHUB_DUMP ==="
          echo "$GITHUB_DUMP" | python -m json.tool 
          echo "=== END GITHUB_DUMP ==="

      # https://github.com/actions/setup-python
      - name: Setup Python toolchain for ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # https://github.com/astral-sh/setup-uv
      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Python dependencies
        shell: bash
        run: |
          uv sync --no-managed-python

      - name: Run Python checks (tests)
        shell: bash
        env:
          OUTDIR: build/qa-${{ matrix.python-version }}-${{ matrix.os}}
        run: |
          uv run pytest -vvs -l \
              --cov=${{ env.PACKAGE }} \
              --cov-report=html:$OUTDIR/coverage --cov-report=xml:$OUTDIR/coverage.xml \
              --junitxml=$OUTDIR/junit/junit.xml --html=$OUTDIR/junit/junit.html --self-contained-html \
            tests

      - name: Archive artifacts
        uses: actions/upload-artifact@v7
        with:
          name: qa-results-${{ matrix.python-version }}-${{ matrix.os }}
          path: |
            build/qa-${{ matrix.python-version }}-${{ matrix.os}}
        # Use always() to always run this step to publish test results when there are test failures
        if: always()
